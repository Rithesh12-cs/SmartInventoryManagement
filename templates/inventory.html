 <!-- ==================== INVENTORY PAGE ==================== -->
  <div class="page" id="page-inventory">
    <div class="page-intro">
      <h1>Inventory Management</h1>
      <p>Track, update and manage your complete product catalog.</p>
    </div>
    <div class="inv-kpi-row">
      <div class="inv-kpi"><span id="invTotal">248</span><small>Total SKUs</small></div>
      <div class="inv-kpi"><span id="invLow">18</span><small>Low Stock</small></div>
      <div class="inv-kpi"><span id="invOut">3</span><small>Out of Stock</small></div>
      <div class="inv-kpi"><span id="invVal">$142,600</span><small>Total Value</small></div>
    </div>
    <div class="action-bar">
      <div class="search-wrap sm"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" placeholder="Search products..." id="invSearch" oninput="filterInventory()"></div>
      <select class="mini-select" id="catFilter" onchange="filterInventory()"><option value="all">All categories</option><option value="Electronics">Electronics</option><option value="Accessories">Accessories</option><option value="Furniture">Furniture</option><option value="Stationery">Stationery</option></select>
      <select class="mini-select" id="invStatusFilter" onchange="filterInventory()"><option value="all">All status</option><option value="normal">Normal</option><option value="low">Low Stock</option><option value="critical">Critical</option></select>
      <button class="btn-primary" onclick="openProductModal()">+ Add Product</button>
      <button class="btn-ghost">↓ Export</button>
    </div>
    <div class="data-table-wrap">
      <table class="data-table" id="invTable">
        <thead><tr><th>Product</th><th>SKU</th><th>Category</th><th>Stock</th><th>Reorder Level</th><th>Unit Price</th><th>Status</th><th>ML Forecast</th><th>Actions</th></tr></thead>
        <tbody id="invTableBody"></tbody>
      </table>
    </div>
    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal">
      <div class="modal">
        <div class="modal-hdr"><h3 id="productModalTitle">Add New Product</h3><button class="modal-close" onclick="closeProductModal()">✕</button></div>
        <div class="modal-body">
          <div class="form-row">
            <div class="field"><label>Product Name</label><input type="text" id="pName" placeholder="e.g. Wireless Mouse"></div>
            <div class="field"><label>SKU</label><input type="text" id="pSku" placeholder="SKU-001"></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Category</label>
              <select id="pCat"><option>Electronics</option><option>Accessories</option><option>Furniture</option><option>Stationery</option></select>
            </div>
            <div class="field"><label>Unit Price ($)</label><input type="number" id="pPrice" min="0" placeholder="0.00"></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Current Stock</label><input type="number" id="pStock" min="0" placeholder="0"></div>
            <div class="field"><label>Reorder Level</label><input type="number" id="pReorder" min="0" placeholder="10"></div>
          </div>
          <div class="field"><label>Supplier</label><input type="text" id="pSupplier" placeholder="Supplier name"></div>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" onclick="closeProductModal()">Cancel</button>
          <button class="btn-primary" onclick="saveProduct()">Save Product</button>
        </div>
      </div>
    </div>
  </div>
